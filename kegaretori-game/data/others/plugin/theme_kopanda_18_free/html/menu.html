<div id="menu_menu_wrapper">
  <style>
    #menu_menu_wrapper .menu_item {
      position: relative;
      margin: 0;
      cursor: pointer;
    }

    #menu_menu_wrapper .menu_item img {
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
    }

    #menu_menu_wrapper .menu_close {
      position: absolute;
      top: 646px;
      left: 24px;
    }

    #menu_menu_wrapper .menu_save {
      display: inline-block;
      position: absolute;
      margin: 0;
      padding: 0;
      top: 158px;
      left: 244px;
    }

    #menu_menu_wrapper .menu_load {
      display: inline-block;
      position: absolute;
      margin: 0;
      padding: 0;
      top: 158px;
      left: 648px;
    }

    #menu_menu_wrapper .menu_config {
      display: inline-block;
      position: absolute;
      margin: 0;
      padding: 0;
      top: 368px;
      left: 244px;
    }

    #menu_menu_wrapper .menu_back_title {
      display: inline-block;
      position: absolute;
      margin: 0;
      padding: 0;
      top: 368px;
      left: 648px;
    }

    #menu_menu_wrapper .menu_save img:active,
    #menu_menu_wrapper .menu_load img:active,
    #menu_menu_wrapper .menu_config img:active,
    #menu_menu_wrapper .menu_back_title img:active {
      transform: translateY(4px);
      transition: transform 0.1s ease;
    }

    #menu_menu_wrapper .menu_close img:active {
      transform: translateY(2px);
      transition: transform 0.1s ease;
    }
  </style>

  <div class="display_menu block_menu" align="center">
    <div class="menu_item menu_close">
      <a href="javascript:void(0)"><img src="data/others/plugin/theme_kopanda_18_free/image/system/btn_back.png"></a>
    </div>

    <div>
      <div class="menu_item menu_save">
        <a href="javascript:void(0)"><img src="data/others/plugin/theme_kopanda_18_free/image/system/menu_button_save.png"></a>
      </div>

      <div class="menu_item menu_load">
        <a href="javascript:void(0)"><img src="data/others/plugin/theme_kopanda_18_free/image/system/menu_button_load.png"></a>
      </div>

      <div class="menu_item menu_config">
        <a href="javascript:void(0)" onclick="return kopandaCodexMenuConfig(event);">
          <img src="data/others/plugin/theme_kopanda_18_free/image/system/menu_button_config.png">
        </a>
      </div>

      <div class="menu_item menu_back_title">
        <a href="javascript:void(0)"><img src="data/others/plugin/theme_kopanda_18_free/image/system/menu_button_title.png"></a>
      </div>
    </div>
  </div>

  <img src="data/others/plugin/theme_kopanda_18_free/image/system/menu_bg.png" style="z-index:-1;left:0;top:0;width:100%;height:100%;position:absolute;">

  <script>
    window.kopandaCodexMenuConfig = function(evt) {
      if (evt) {
        evt.preventDefault();
        evt.stopPropagation();
      }

      if (tyrano.plugin.kag.tmp.sleep_game != null) {
        return false;
      }

      TYRANO.kag.ftag.startTag("sleepgame", {
        storage: "config.ks",
        next: false
      });

      setTimeout(function() {
        $(".layer.layer_menu").css({
          display: "none"
        });
      }, 350);

      return false;
    };

    $("#menu_menu_wrapper .menu_item img").each(function(i, elm) {
      const jElm = $(elm);
      const originalSrc = jElm.attr("src");
      const hoverSrc = originalSrc.replace(".png", "_hov.png");
      const clickSrc = originalSrc.replace(".png", "_clk.png");
      let isMouseDown = false;

      jElm.hover(
        function() {
          if (!isMouseDown) jElm.attr("src", hoverSrc);
        },
        function() {
          if (!isMouseDown) jElm.attr("src", originalSrc);
        }
      );

      jElm.on("mousedown", function() {
        isMouseDown = true;
        jElm.attr("src", clickSrc);
      });

      $(document).on("mouseup.kopandaCodexMenu", function() {
        if (isMouseDown) {
          isMouseDown = false;
          jElm.attr("src", jElm.is(":hover") ? hoverSrc : originalSrc);
        }
      });

      jElm.on("touchstart", function() {
        jElm.attr("src", clickSrc);
      });

      jElm.on("touchend touchcancel", function() {
        jElm.attr("src", originalSrc);
      });
    });
  </script>
</div>
